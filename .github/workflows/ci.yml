name: EFS — CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run tests
        working-directory: ./backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: github_actions_test_secret_key_only

      - name: Generate coverage report
        working-directory: ./backend
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: github_actions_test_secret_key_only

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: backend/coverage/

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install deps
        working-directory: ./backend
        run: npm ci
      - name: Check for syntax errors
        working-directory: ./backend
        run: node --check server.js && node --check routes/auth.js && node --check routes/orders.js && node --check routes/products.js && node --check routes/admins.js
        
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        # Set RENDER_DEPLOY_HOOK in GitHub repo Settings → Secrets
        # Get it from Render dashboard → Your Service → Settings → Deploy Hook
